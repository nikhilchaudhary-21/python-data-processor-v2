name: Smartlead Auto Sync

on:
  schedule:
    # IST Timings: 9:00 AM, 3:00 PM, 9:00 PM, 3:00 AM
    # UTC Timings: 3:30, 9:30, 15:30, 21:30
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch: # Manual "Run" button ke liye

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client

      - name: Run Smartlead Script
        env:
          # GitHub Secrets se values fetch karega
          SMARTLEAD_API_KEY: ${{ secrets.SMARTLEAD_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python smart.py
